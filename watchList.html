        <link rel="stylesheet" href="style.css">
        <!-- Font awesome -->

    <body>
        <header id="whatch-header">
            <h1>My Watchlist</h1>
            <nav>
                <ul>
                    <li> <a href="index.html">Search for movies</a></li>
